<!doctype html>
<html lang="en">

<head>
    <title>Cyberpunk City Grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-
w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
</head>
<style>
    :root {
        --neon-pink: #ff007f;
        --neon-blue: #00f2ff;
        --dark-bg: #0d0d0d;
        --card-bg: rgba(255, 255, 255, 0.05);
    }

    body {
        background-color: var(--dark-bg);
        color: #fff;
        font-family: 'Inter', sans-serif;
    }

    h1 {
        font-family: 'Orbitron', sans-serif;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--neon-blue);
        text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
        margin-bottom: 2rem;
        text-align: center;
    }

    .img-container {
        position: relative;
        overflow: hidden;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: var(--card-bg);
        backdrop-filter: blur(10px);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        height: 100%;
    }

    .img-container:hover {
        transform: translateY(-10px) scale(1.02);
        border-color: var(--neon-pink);
        box-shadow: 0 0 20px rgba(255, 0, 127, 0.4);
        z-index: 10;
    }

    img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s ease;
    }

    .img-container:hover img {
        transform: scale(1.1);
        filter: saturate(1.2) brightness(1.1);
    }

    .wrapper {
        max-width: 1000px;
    }

    /* Neon Border Mask */
    .img-container::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        border-radius: 12px;
        pointer-events: none;
        box-shadow: inset 0 0 0 0px var(--neon-blue);
        transition: box-shadow 0.3s ease;
    }

    .img-container:hover::after {
        box-shadow: inset 0 0 0 2px var(--neon-pink);
    }
</style>

<body class="bg-dark text-white">
    <div class="wrapper mx-auto py-5">
        <h1>Night City</h1>
        <div class="container-fluid">
            <!-- Row 1: Large Featured and Side Grid -->
            <div class="row g-4 mb-4">
                <div class="col-md-8">
                    <div class="img-container">
                        <img src="media/cyberpunk_1.png" alt="Cyberpunk Cityscape">
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="img-container">
                        <img src="media/naruto_cyberpunk.png" alt="Cyber Ninja">
                    </div>
                </div>
            </div>

            <!-- Row 2: Triple Grid -->
            <div class="row g-4 mb-4">
                <div class="col-6 col-md-4">
                    <div class="img-container">
                        <img src="media/cyberpunk_3.png" alt="Holographic Interface">
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div class="img-container">
                        <img src="media/cyberpunk_4.png" alt="Futuristic Vehicle">
                    </div>
                </div>
                <div class="col-12 col-md-4">
                    <div class="img-container">
                        <img src="media/cyberpunk_5.png" alt="High Tech Skyscrapers">
                    </div>
                </div>
            </div>

            <!-- Row 3: Split Dual Grid -->
            <div class="row g-4">
                <div class="col-6">
                    <div class="img-container">
                        <img src="media/cyberpunk_6.png" alt="Cybernetic Augmentation">
                    </div>
                </div>
                <div class="col-6">
                    <div class="img-container">
                        <img src="media/cyberpunk_7.png" alt="Dense Skyline">
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
